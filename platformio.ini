; ============================================================
; Pilih environment sesuai board yang digunakan:
;   pio run -e esp32dev    (ESP32 klasik)
;   pio run -e esp32c3     (ESP32-C3)
;   pio run -e esp32s3     (ESP32-S3)
; ============================================================

[common]
framework    = arduino
monitor_speed = 115200
upload_speed  = 115200 
lib_deps =
    robtillaart/AS5600@^0.6.3

; ─── ESP32 (klasik / WROOM / WROVER) ───────────────────────
; [env:esp32dev]
; platform  = espressif32
; board     = esp32dev
; extends   = common
; upload_port = COM22
; ─── ESP32-C3 ───────────────────────────────────────────────
[env:esp32c3]
platform  = espressif32@7.0.0
board     = esp32-c3-devkitm-1
extends   = common
upload_port = COM18
; ESP32-C3 hanya punya 1 HardwareSerial (UART0 = USB-CDC).
; UART1 tetap tersedia untuk RS485 dengan pin custom    

; ─── ESP32-S3 ───────────────────────────────────────────────
; [env:esp32s3]
; platform  = espressif32
; board     = esp32-s3-devkitc-1
; extends   = common

